<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/javascript.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Coord json parser</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <h1>Завантаж JSON-файл</h1>
    <input type="file" id="fileInput" accept=".json" multiple />
    <p class="coordinate_system" data-js="display" style="display: none"></p>

    <p>Координати ділянки:</p>
    <b class="coordinate_of_area" data-js="display" style="display: none"></b>
    <button
      id="copyCoords"
      type="button"
      data-js="display"
      style="display: none"
    >
      Копі / Навігація
    </button>

    <label for="firstNum">З якого нумеровати:</label>
    <input type="number" name="firstNum" id="firstNum" value="1" min="0" />
    <button
      type="button"
      id="changeXYBtn"
      data-js="display"
      style="display: none"
    >
      X &lt; &gt; Y
    </button>
    <pre contenteditable="true" class="output" id="output"></pre>

    <button type="button" id="saveBtn" data-js="display" style="display: none">
      Зберегти як .txt
    </button>
    <button
      type="button"
      id="saveKMLBtn"
      data-js="display"
      style="display: none"
    >
      Зберегти як .kml
    </button>

    <button id="showMyLocation" data-js="display" style="display: none">
      Показати мою локацію
    </button>
    <button id="centerOnMe" style="display: none">Показати мою локацію</button>
    <button id="centerOnArea" style="display: none">Показати ділянку</button>
    <div id="mapG" data-js="display" style="display: none"></div>

    <p>Розробив: Моспан Володимир || версія: 0.3.10</p>

    <script type="module" src="/src/main.js"></script>
    <script type="module" src="./src/maps/google_maps/gm.js"></script>
    <script>
      document.addEventListener("gesturestart", (e) => e.preventDefault());
      document.addEventListener("gesturechange", (e) => e.preventDefault());
      document.addEventListener("gestureend", (e) => e.preventDefault());

      // let lastTouchEnd = 0;
      // document.addEventListener(
      //   "touchend",
      //   function (event) {
      //     const now = Date.now();
      //     if (now - lastTouchEnd <= 300) {
      //       event.preventDefault();
      //     }
      //     lastTouchEnd = now;
      //   },
      //   false,
      // );
    </script>
  </body>
</html>
